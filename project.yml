name: ReadingSociety
options:
  bundleIdPrefix: com.andifrausen
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
targets:
  DesignSystem:
    type: framework
    platform: iOS
    sources:
      - Sources/DesignSystem
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        MACH_O_TYPE: staticlib

  Networking:
    type: framework
    platform: iOS
    sources:
      - Sources/Networking
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        MACH_O_TYPE: staticlib

  Authentication:
    type: framework
    platform: iOS
    sources:
      - Sources/Authentication
    dependencies:
      - target: Networking
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        MACH_O_TYPE: staticlib

  Features:
    type: framework
    platform: iOS
    sources:
      - Sources/Features
    dependencies:
      - target: DesignSystem
      - target: Networking
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        MACH_O_TYPE: staticlib

  AppShell:
    type: framework
    platform: iOS
    sources:
      - Sources/AppShell
    dependencies:
      - target: Authentication
      - target: DesignSystem
      - target: Features
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        MACH_O_TYPE: staticlib

  ReadingSociety:
    type: application
    platform: iOS
    sources:
      - Sources/ReadingSociety
      - Sources/Resources
    dependencies:
      - target: AppShell
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andifrausen.readingsociety
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Reading Society
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO

  ReadingSocietyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/ReadingSocietyTests
    dependencies:
      - target: ReadingSociety
      - target: DesignSystem
schemes:
  ReadingSociety:
    build:
      targets:
        ReadingSociety: all
    test:
      targets:
        - ReadingSocietyTests
